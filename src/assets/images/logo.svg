<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0055;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B00FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="playGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="250" cy="250" r="200" fill="none" stroke="url(#filmGrad)" stroke-width="40" />

    <circle cx="250" cy="250" r="235" fill="none" stroke="#FF0055" stroke-width="10" stroke-dasharray="15, 20" opacity="0.6" />
    <circle cx="250" cy="250" r="165" fill="none" stroke="#7B00FF" stroke-width="10" stroke-dasharray="15, 20" opacity="0.6" />

    <circle cx="250" cy="250" r="130" fill="none" stroke="url(#filmGrad)" stroke-width="15" />

    <path d="M 250 50 L 250 120 M 250 380 L 250 450 M 50 250 L 120 250 M 380 250 L 450 250 M 108 108 L 158 158 M 342 342 L 392 392 M 108 392 L 158 342 M 392 108 L 342 158" 
          stroke="url(#filmGrad)" stroke-width="15" stroke-linecap="round" />

    <path d="M215,170 L215,330 L345,250 Z" 
          fill="url(#playGrad)" 
          stroke="url(#playGrad)" 
          stroke-width="20" 
          stroke-linejoin="round" />
  </g>
</svg>
