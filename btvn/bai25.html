<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Đăng nhập Vinaphone</title>
<script src="bai25.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #e0f2ff 0%, #ffffff 100%);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 24px 28px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        width: 360px;
    }

    h2 {
        margin-top: 0;
        margin-bottom: 14px;
        font-size: 20px;
        color: #1a3d6b;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #333;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 10px 10px;
        border: 1px solid #c4c4c4;
        border-radius: 4px;
        font-size: 14px;
        margin-bottom: 14px;
        box-sizing: border-box;
    }

    input[type="submit"] {
        width: 100%;
        padding: 10px 0;
        background: #1a6fb3;
        border: none;
        border-radius: 4px;
        color: white;
        font-size: 15px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background: #11558b;
    }

    .hint {
        font-size: 12px;
        color: #555;
        margin-top: 12px;
    }
</style>
</head>
<body>
<div class="card">
    <h2>Đăng nhập ptit</h2>
    <form action="https://ptit.edu.vn/lien-he/tat-ca" method="post" onsubmit="return validateForm();">
        <label for="username">User Name</label>
        <input type="text" id="username" name="username" placeholder="Nhập user name">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu">

        <input type="hidden" name="id" value="0">
        <input type="hidden" name="language" value="vi">

        <input type="submit" value="Đăng nhập">
        <div class="hint">(Các trường thông tin phụ sẽ được gửi kèm khi submit.)</div>
    </form>
</div>
</body>
</html>
