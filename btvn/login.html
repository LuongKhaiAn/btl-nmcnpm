<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>login.html</title>
	<link
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		rel="stylesheet"
	/>
</head>
<body>
	<div class="container mt-4">
		<form>
			<div class="form-group mb-3">
				<label for="user">Username</label>
				<input type="text" id="user" class="form-control mt-2" />
			</div>

			<div class="form-group mb-3">
				<label for="pass">Password</label>
				<input type="password" id="pass" class="form-control mt-2" />
			</div>

			<button type="reset" style="width: 200px;" class="btn btn-success">Lam lai</button>
			<button type="button" onclick="dangnhap()" style="width: 200px;" class="btn btn-primary">Dang nhap</button>
		</form>

		<div id="msg" class="mt-3"></div>
	</div>

	<script>
		function dangnhap() {
			let out = document.querySelector("#msg");
			let u = document.querySelector("#user").value;
			let p = document.querySelector("#pass").value;

			console.log(u);
			if (u.toUpperCase() === "VAN" && p === "a123") {
				out.innerHTML = `<h4 class='alert alert-primary'>Hello ${u}</h4>`;
			} else {
				out.innerHTML = "<h4 class='alert alert-danger'>Nhap sai! nhap lai!</h4>";
			}
		}
	</script>
</body>
</html>
