<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <title>Document</title>
</head>
<body>
  <div>
      <select id="tinh"> 
        <option value="angiang">An Giang</option> 
        <option value="bentre">Bến Tre</option> 
        <option value="cantho">Cần Thơ</option> 
        <option value="hcm" selected>Hồ Chí Minh</option> 
        <option value="soctrang">Sóc Trăng</option> 
        <option value="tayninh">Tây Ninh</option> 
        </select> 
        <button onclick="ct()">Chọn tỉnh</button>
        <hr> 
        <button onclick="gantinh('cantho')">Cần Thơ</button> 
        <button onclick="gantinh('tayninh')">Tây Ninh</button> 
        <button onclick="gantinh('bentre')">Bến Tre</button>
        
  </div>
  <script>
      function ct(){
  let v = document.getElementById("tinh").value;
  alert(v);
}
function gantinh(t){
   document.getElementById("tinh").value = t;
}

  </script>

  
</body>
</html>
