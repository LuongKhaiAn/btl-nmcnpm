<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Bài tập JavaScript 28</title>
    <script src="bai28.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        input[type="text"], textarea {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.8);
        }

        input[type="text"] {
            width: 100%;
            height: 40px;
        }

        textarea {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <input type="text" id="txtBox" placeholder="Hộp văn bản (textbox)">
    <p></p>
    <textarea id="txtArea" placeholder="Textarea"></textarea>
</body>
</html>
